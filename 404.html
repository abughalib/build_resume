<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Resume Builder</title>
    <script>
      // GitHub Pages 404 → SPA redirect trick
      // Stores the full path in sessionStorage, then redirects to index.html
      // index.html reads it back and restores the correct route.
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      sessionStorage.setItem('redirect', path + search + hash);
      window.location.replace(window.location.origin + window.location.pathname.split('/')[1]);
    </script>
  </head>
  <body></body>
</html>

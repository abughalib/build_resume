<section class="mb-14">
  <div class="flex items-center gap-3 mb-6">
    <div
      class="bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 p-2 rounded-lg"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6"
        viewBox="0 0 20 20"
        fill="currentColor"
      >
        <path
          fill-rule="evenodd"
          d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
          clip-rule="evenodd"
        />
      </svg>
    </div>
    <h2 class="text-2xl font-bold text-gray-900 dark:text-neutral-50">
      Personal Information
    </h2>
  </div>

  <div
    class="bg-white dark:bg-neutral-800 rounded-xl shadow-[0_0_15px_rgba(0,0,0,0.04)] dark:shadow-none border border-gray-100 dark:border-neutral-700 p-6 space-y-5"
  >
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
      <div class="relative">
        <label
          class="text-xs font-bold text-gray-500 dark:text-neutral-400 uppercase tracking-wider absolute top-2 left-3 z-10 pointer-events-none"
          >Full Name</label
        >
        <input
          type="text"
          [(ngModel)]="personalInfo.name"
          (ngModelChange)="triggerChange()"
          placeholder="e.g. John Doe"
          class="w-full pt-7 pb-2 px-3 bg-gray-50 dark:bg-neutral-900 border-0 border-b-2 border-gray-200 dark:border-neutral-600 hover:border-gray-300 dark:hover:border-neutral-500 focus:border-indigo-500 focus:ring-0 rounded-t-lg transition-colors font-medium text-gray-800 dark:text-neutral-100 focus:bg-white dark:focus:bg-neutral-800"
        />
      </div>
      <div class="relative">
        <label
          class="text-xs font-bold text-gray-500 dark:text-neutral-400 uppercase tracking-wider absolute top-2 left-3 z-10 pointer-events-none"
          >Email Address</label
        >
        <input
          type="text"
          [(ngModel)]="personalInfo.email"
          (ngModelChange)="triggerChange()"
          placeholder="john@example.com"
          class="w-full pt-7 pb-2 px-3 bg-gray-50 dark:bg-neutral-900 border-0 border-b-2 border-gray-200 dark:border-neutral-600 hover:border-gray-300 dark:hover:border-neutral-500 focus:border-indigo-500 focus:ring-0 rounded-t-lg transition-colors font-medium text-gray-800 dark:text-neutral-100 focus:bg-white dark:focus:bg-neutral-800"
        />
      </div>
      <div class="relative md:col-span-2">
        <label
          class="text-xs font-bold text-gray-500 dark:text-neutral-400 uppercase tracking-wider absolute top-2 left-3 z-10 pointer-events-none"
          >Phone Number</label
        >
        <input
          type="text"
          [(ngModel)]="personalInfo.phone"
          (ngModelChange)="triggerChange()"
          placeholder="+1 (555) 000-0000"
          class="w-full pt-7 pb-2 px-3 bg-gray-50 dark:bg-neutral-900 border-0 border-b-2 border-gray-200 dark:border-neutral-600 hover:border-gray-300 dark:hover:border-neutral-500 focus:border-indigo-500 focus:ring-0 rounded-t-lg transition-colors font-medium text-gray-800 dark:text-neutral-100 focus:bg-white dark:focus:bg-neutral-800"
        />
      </div>
    </div>

    <div
      class="pt-4 mt-2 border-t border-dashed border-gray-200 dark:border-neutral-700"
    >
      <label
        class="block text-sm font-semibold text-gray-700 dark:text-neutral-300 mb-3"
        >Social & Web Links</label
      >

      @for (link of personalInfo.links; track link; let i = $index) {
      <div class="flex gap-3 mb-3 relative group">
        <input
          type="text"
          placeholder="Label (e.g. LinkedIn)"
          [(ngModel)]="link.preview_name"
          (ngModelChange)="triggerChange()"
          class="w-1/3 rounded-lg border-gray-200 dark:border-neutral-600 bg-white dark:bg-neutral-900 dark:text-neutral-100 text-sm shadow-sm focus:border-indigo-500 focus:ring focus:ring-indigo-200 focus:ring-opacity-50"
        />
        <input
          type="url"
          placeholder="URL"
          [(ngModel)]="link.url"
          (ngModelChange)="triggerChange()"
          class="flex-1 rounded-lg border-gray-200 dark:border-neutral-600 bg-gray-50 dark:bg-neutral-900 text-indigo-600 dark:text-indigo-400 font-mono text-sm shadow-sm focus:border-indigo-500 focus:ring focus:ring-indigo-200 focus:ring-opacity-50"
        />
        <button
          type="button"
          (click)="personalInfo.links.splice(i, 1); triggerChange()"
          class="absolute -right-8 top-2 text-gray-300 dark:text-neutral-600 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100"
          title="Remove Link"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path
              fill-rule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
              clip-rule="evenodd"
            />
          </svg>
        </button>
      </div>
      }

      <div
        class="flex gap-3 items-center mt-3 p-3 bg-indigo-50/50 dark:bg-gray-900/20 rounded-lg border border-indigo-100 dark:border-indigo-800/50 border-dashed transition-all hover:bg-indigo-50 dark:hover:bg-indigo-900/30"
      >
        <input
          type="text"
          placeholder="New Link Label"
          [(ngModel)]="currentLink.preview_name"
          class="w-1/3 rounded-md border-gray-200 dark:border-neutral-600 bg-white dark:bg-neutral-900 dark:text-neutral-100 text-sm shadow-sm focus:border-indigo-400 transition-colors"
        />
        <input
          type="url"
          placeholder="https://..."
          [(ngModel)]="currentLink.url"
          class="flex-1 rounded-md border-gray-200 dark:border-neutral-600 bg-white dark:bg-neutral-900 dark:text-neutral-100 text-sm shadow-sm focus:border-indigo-400 transition-colors"
        />
        <button
          (click)="onAddLink()"
          class="px-4 py-2 bg-white dark:bg-neutral-800 hover:bg-indigo-600 hover:text-white hover:border-indigo-600 border border-indigo-200 dark:border-indigo-700 text-indigo-700 dark:text-indigo-400 text-sm font-medium rounded-md shadow-sm flex items-center gap-1 transition-all"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path
              fill-rule="evenodd"
              d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z"
              clip-rule="evenodd"
            />
          </svg>
          + Add
        </button>
      </div>
    </div>
  </div>
</section>
